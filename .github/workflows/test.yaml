# This is a GitHub workflow defining a set of jobs with a set of steps.
# ref: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
name: Test

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/workflows/*"
      - "!.github/workflows/test.yaml"
  push:
    paths-ignore:
      - "**.md"
      - ".github/workflows/*"
      - "!.github/workflows/test.yaml"
    branches-ignore:
      - "dependabot/**"
      - "pre-commit-ci-update-config"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chart-tests:
    runs-on: ubuntu-24.04

    strategy:
      # Keep running even if one variation of the job fail
      fail-fast: false
      matrix:
        # We run this job multiple times with different parameterization
        # specified below, these parameters have no meaning on their own and
        # gain meaning on how job steps use them.
        include:
          - python: "3.10"
            helm: "v3.20.2"
          - python: "3.11"
          - python: "3.12"
          - python: "3.13"
            helm: latest
          - python: "3.14"

    services:
      local-registry:
        image: registry:3
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # chartpress requires the full history
          fetch-depth: 0
          persist-credentials: false

      # NOTE: actions/setup-python@v6 make use of a cache within the GitHub base
      #       environment and setup in a fraction of a second.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[test]"
          pip freeze

      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ matrix.helm || 'v4.1.4' }} # default is latest (stable)

      # https://github.com/docker/setup-buildx-action
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          # Allows pushing to registry on localhost:5000
          driver-opts: network=host

      - name: Log environment information
        run: |
          docker version
          docker buildx ls
          helm version
          chartpress --version
          chartpress --help

      - name: Configure a git user
        # Having a user.email and user.name configured with git is required to
        # make commits, which is something chartpress does when publishing.
        # While Travis CI had a dummy user by default, GitHub Actions doesn't
        # and require this explicitly setup.
        run: |
          git config --global user.email "github-actions@example.local"
          git config --global user.name "GitHub Actions user"

      - name: Run tests
        run: |
          pytest

      # GitHub action reference: https://github.com/codecov/codecov-action
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
